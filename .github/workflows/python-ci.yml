name: Python CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  ci:
    name: 🐍 Lint · Test · Coverage
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flake8 black isort pytest pytest-cov

      - name: Check for Python files
        id: check
        run: |
          echo "has_python=$(find . -name '*.py' -not -path './.git/*' | head -1 | grep -q . && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
          echo "has_tests=$(find . -name 'test_*.py' -o -name '*_test.py' | head -1 | grep -q . && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT

      - name: Lint — flake8
        if: steps.check.outputs.has_python == 'true'
        run: flake8 . --max-line-length=100 --exclude=.venv,build,dist,.git

      - name: Lint — black (format check)
        if: steps.check.outputs.has_python == 'true'
        run: black --check . || true

      - name: Lint — isort (import order)
        if: steps.check.outputs.has_python == 'true'
        run: isort --check-only . || true

      - name: Run tests with coverage
        if: steps.check.outputs.has_tests == 'true'
        run: |
          pytest \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short \
            -v

      - name: Skip notice
        if: steps.check.outputs.has_python == 'false'
        run: echo "ℹ️ No Python files found — skipping lint and test steps"
