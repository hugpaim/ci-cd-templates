name: Terraform Plan

on:
  pull_request:
    branches: [main]
    paths:
      - '**.tf'
      - '**.tfvars'

env:
  TF_VERSION: "1.7.5"
  TF_DIR:     "environments/dev"   # change per repo

jobs:

  plan:
    name: 📋 Terraform Plan
    runs-on: ubuntu-latest
    permissions:
      contents:      read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            eu-west-1

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init -backend=false
        working-directory: ${{ env.TF_DIR }}

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color
        working-directory: ${{ env.TF_DIR }}

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false 2>&1 | tee plan-output.txt
        working-directory: ${{ env.TF_DIR }}
        continue-on-error: true

      - name: Comment PR with plan
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.existsSync('${{ env.TF_DIR }}/plan-output.txt')
              ? fs.readFileSync('${{ env.TF_DIR }}/plan-output.txt', 'utf8').slice(0, 60000)
              : 'Plan output not available';

            const body = `## Terraform Plan — \`${{ env.TF_DIR }}\`

            | Step | Status |
            |------|--------|
            | fmt  | ${{ steps.fmt.outcome == 'success' && '✅' || '❌' }} |
            | init | ${{ steps.init.outcome == 'success' && '✅' || '❌' }} |
            | validate | ${{ steps.validate.outcome == 'success' && '✅' || '❌' }} |
            | plan | ${{ steps.plan.outcome == 'success' && '✅' || '❌' }} |

            <details><summary>Show Plan</summary>

            \`\`\`hcl
            ${plan}
            \`\`\`
            </details>

            *Pushed by @${{ github.actor }}*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              body
            });
